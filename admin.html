<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Papaya Peptides — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:#111;background:#fafafa;font-size:13px;padding:24px}
h1{font-size:15px;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:18px}
.login{max-width:340px;margin:60px auto;background:#fff;padding:26px;border:1px solid #eee}
.login input{width:100%;padding:12px;border:1px solid #ccc;margin:10px 0}
button{background:#161616;color:#fff;border:none;padding:9px 14px;cursor:pointer;font-size:12px;letter-spacing:.4px}
button.sec{background:#fff;color:#111;border:1px solid #ccc}
button:hover{opacity:.85}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.order{background:#fff;border:1px solid #eee;margin-bottom:12px;padding:16px}
.order .top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;cursor:pointer}
.no{font-weight:600;letter-spacing:.5px}
.badge{font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:20px;background:#eee}
.badge.paid,.badge.processing,.badge.shipped,.badge.delivered{background:#16331f;color:#fff}
.badge.pending_payment,.badge.etransfer_pending{background:#E8731C;color:#fff}
.badge.cancelled{background:#999;color:#fff}
.muted{color:#888}
.detail{margin-top:14px;border-top:1px solid #f0f0f0;padding-top:14px;display:none}
.detail.open{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:12px}
.items{margin:10px 0}
.items div{padding:3px 0}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center}
.acts input,.acts select{padding:7px;border:1px solid #ccc;font-size:12px}
.empty{text-align:center;color:#888;padding:50px}
.reqbox{margin-top:14px;border:1px solid #E8731C;background:#fff7f0;border-radius:6px;padding:12px 14px}
.reqh{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#E8731C;font-weight:700;margin-bottom:8px}
.reqrow{display:flex;align-items:center;gap:10px;padding:4px 0}
.reqrow span{width:160px;color:#888;font-size:11px}
.reqrow b{flex:1;font-size:14px}
.cpy{background:#fff;color:#E8731C;border:1px solid #E8731C;padding:3px 10px;font-size:11px;border-radius:4px;letter-spacing:0}
.reqnote{font-size:11px;color:#888;margin-top:9px;line-height:1.5}
.confirm-wrap{margin-bottom:26px}
.confirm-wrap h1{color:#2e7d46}
.dcard{background:#f2f8f2;border:1px solid #cfe6d6;border-left:4px solid #3a9d5d;border-radius:6px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.dcard .info{font-size:12px}
.dcard .info b{font-size:14px;letter-spacing:.5px}
.dconf{font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:20px;background:#2e7d46;color:#fff;margin-left:6px}
.dconf.medium{background:#E8731C}
.dcard .info .sub{color:#6b8a74;margin-top:3px}
.dcard .acts{margin:0}
.btn-green{background:#2e7d46}
</style></head><body>

<div id="login" class="login">
  <h1>Admin</h1>
  <p class="muted">Enter your admin key (the ADMIN_KEY from your server settings).</p>
  <input id="key" type="password" placeholder="Admin key" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Sign in</button>
  <p id="err" style="color:#c00;margin-top:8px;font-size:12px"></p>
</div>

<div id="app" style="display:none">
  <div id="detected"></div>
  <div class="bar"><h1>Orders</h1><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><input type="date" id="fFrom" onchange="load()" title="From date" style="padding:6px;border:1px solid #ccc"><input type="date" id="fTo" onchange="load()" title="To date" style="padding:6px;border:1px solid #ccc"><input id="fSearch" oninput="load()" placeholder="Search email / order #" style="padding:7px;border:1px solid #ccc;width:180px"><button class="sec" onclick="clearFilters()">Clear</button><button class="sec" onclick="load()">Refresh</button> <button class="sec" onclick="logout()">Sign out</button></div></div>
  <div id="list"></div>
  <div class="bar" style="margin-top:34px"><h1>Leads</h1><div>
    <button class="sec" onclick="loadLeads('affiliates')">Affiliates</button>
    <button class="sec" onclick="loadLeads('referrals')">Referrals</button>
    <button class="sec" onclick="loadLeads('contacts')">Messages</button></div></div>
  <div id="leads"></div>
</div>

<script>
let KEY = sessionStorage.getItem('pp_admin') || '';
const $ = id => document.getElementById(id);
const money = n => '$' + Number(n).toLocaleString();
const api = (p, opt={}) => fetch('/api/admin'+p, {...opt, headers:{'Content-Type':'application/json','x-admin-key':KEY}});

if (KEY) { $('login').style.display='none'; $('app').style.display='block'; load(); }

async function doLogin(){
  KEY = $('key').value.trim();
  const r = await api('/orders');
  if (r.status === 401){ $('err').textContent='Wrong key.'; return; }
  sessionStorage.setItem('pp_admin', KEY);
  $('login').style.display='none'; $('app').style.display='block'; load();
}
function logout(){ sessionStorage.removeItem('pp_admin'); location.reload(); }

const STATUSES = ['pending_payment','paid','processing','shipped','out_for_delivery','delivered','cancelled'];

async function load(){
  loadDetected();
  const r = await api('/orders'); if(!r.ok){ $('list').innerHTML='<div class="empty">Error loading.</div>'; return; }
  let orders = await r.json();
  if(!orders.length){ $('list').innerHTML='<div class="empty">No orders yet.</div>'; return; }
  orders = applyFilters(orders);
  if(!orders.length){ $('list').innerHTML='<div class="empty">No orders match your filters.</div>'; return; }
  $('list').innerHTML = orders.map(o=>{
    const c=o.customer||{};
    return `<div class="order">
      <div class="top" onclick="this.parentNode.querySelector('.detail').classList.toggle('open')">
        <div><span class="no">${o.no?o.no:o.orderNo}</span> <span class="muted">· ${new Date(o.createdAt).toLocaleString()}</span></div>
        <div><span class="muted">${o.method}</span> &nbsp; <b>${money(o.total)}</b> &nbsp; <span class="badge ${o.status}">${o.status.replace(/_/g,' ')}</span></div>
      </div>
      <div class="detail">
        <div class="grid2">
          <div><b>${c.firstName||''} ${c.lastName||''}</b></div><div>${c.email||''}</div>
          <div>${c.phone||''}</div><div>${c.lab||''}</div>
          <div style="grid-column:1/-1">${[c.address,c.city,c.state,c.zip,c.country].filter(Boolean).join(', ')}</div>
        </div>
        <div class="items">${o.items.map(i=>`<div>${i.qty} × ${i.name} <span class="muted">(${i.vial})</span> — ${money(i.lineTotal)}${i.discount?` <span class="muted">−${i.discount*100}%</span>`:''}</div>`).join('')}</div>
        <div class="muted">Subtotal ${money(o.subtotal)} · Shipping ${o.shipping?money(o.shipping):'Free'} · Tax ${money(o.tax||0)} · <b>Total ${money(o.total)}</b></div>
        ${o.meta?`<div class="muted" style="margin-top:8px;font-size:11px;line-height:1.5"><b>Origin</b> · IP: ${o.meta.ip||'—'} · from: ${o.meta.referer||'—'}<br>${o.meta.userAgent||''}</div>`:`<div class="muted" style="margin-top:8px;font-size:11px">Origin: not recorded (placed before origin logging was added)</div>`}
        ${o.payment&&o.payment.hostedUrl?`<div style="margin-top:6px"><a href="${o.payment.hostedUrl}" target="_blank">Crypto checkout link</a></div>`:''}
        ${o.method==='etransfer'&&(o.status==='pending_payment'||o.status==='etransfer_pending')?`
        <div class="reqbox">
          <div class="reqh">Send Interac Request Money</div>
          <div class="reqrow"><span>Request from</span><b>${c.email||'—'}</b><button class="cpy" onclick="cpy(${JSON.stringify(c.email||'')},this)">Copy</button></div>
          <div class="reqrow"><span>Amount (incl. tax)</span><b>${money(o.total)}</b><button class="cpy" onclick="cpy('${o.total}',this)">Copy</button></div>
          <div class="reqrow"><span>Message / memo</span><b>${o.orderNo}</b><button class="cpy" onclick="cpy('${o.orderNo}',this)">Copy</button></div>
          <div class="reqnote">In your banking app: Interac e-Transfer → <b>Request Money</b> → paste the email, amount and memo above. Once the customer approves and it lands, tap <b>Mark e-Transfer paid</b> below to send their confirmation email.</div>
        </div>`:''}
        <div class="acts">
          ${(o.status==='pending_payment'||o.status==='etransfer_pending')&&o.method==='etransfer'?`<button onclick="markPaid('${o.orderNo}')">Mark e-Transfer paid</button>`:''}
          <select id="st-${o.orderNo}">${STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join('')}</select>
          <button class="sec" onclick="setStatus('${o.orderNo}')">Update status</button>
        </div>
        <div class="acts">
          <input id="car-${o.orderNo}" placeholder="Carrier" value="${(o.tracking&&o.tracking.carrier)||''}" style="width:130px">
          <input id="trk-${o.orderNo}" placeholder="Tracking #" value="${(o.tracking&&o.tracking.number)||''}" style="width:170px">
          <button class="sec" onclick="setTracking('${o.orderNo}')">Save tracking</button>
        </div>
      </div></div>`;
  }).join('');
}
async function loadLeads(type){
  const r=await api('/'+type); const data=r.ok?await r.json():[];
  const el=$('leads');
  if(!data.length){ el.innerHTML='<div class="empty">No '+type+' yet.</div>'; return; }
  el.innerHTML=data.slice().reverse().map(d=>`<div class="order"><div class="top"><div><b>${d.name||d.email||d.code||''}</b> <span class="muted">${d.email||''}</span></div><div class="muted">${new Date(d.createdAt).toLocaleString()}</div></div>${d.code?`<div class="muted">Code: <b>${d.code}</b></div>`:''}${d.url?`<div class="muted">${d.url}</div>`:''}${d.message?`<div style="margin-top:6px">${d.message}</div>`:''}</div>`).join('');
}
function cpy(t,btn){ navigator.clipboard.writeText(String(t)).then(()=>{const o=btn.textContent;btn.textContent='Copied';setTimeout(()=>btn.textContent=o,1200);}); }
async function loadDetected(){
  let data=[];
  try{ const r=await api('/payments/detected'); if(r.ok) data=await r.json(); }catch(e){}
  const el=$('detected');
  if(!data.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="confirm-wrap"><div class="bar"><h1>Payments to confirm (${data.length})</h1></div>`
    + data.map(o=>{
      const d=o.paymentDetected||{}; const c=o.customer||{};
      return `<div class="dcard">
        <div class="info">
          <b>${o.orderNo}</b> <span class="dconf ${d.confidence||''}">${(d.confidence||'').toUpperCase()} MATCH</span><br>
          <span>${money(o.total)} · ${c.firstName||''} ${c.lastName||''} · ${c.email||''}</span>
          <div class="sub">Detected ${d.detectedAt?new Date(d.detectedAt).toLocaleString():''} — ${d.reason||''}. Please verify the deposit landed in your account before confirming.</div>
        </div>
        <div class="acts">
          <button class="btn-green" onclick="confirmPay('${o.orderNo}')">Confirm &amp; send receipt</button>
          <button class="sec" onclick="dismissDetection('${o.orderNo}')">Dismiss</button>
        </div></div>`;
    }).join('') + `</div>`;
}
async function confirmPay(no){ if(!confirm('Confirm payment for '+no+'? This marks it paid and emails the customer their confirmation.')) return; await api('/orders/'+no+'/mark-paid',{method:'POST'}); load(); }
async function dismissDetection(no){ await api('/orders/'+no+'/dismiss-detection',{method:'POST'}); loadDetected(); }
async function markPaid(no){ await api('/orders/'+no+'/mark-paid',{method:'POST'}); load(); }
function applyFilters(list){
  const from=$('fFrom').value, to=$('fTo').value, q=($('fSearch').value||'').toLowerCase().trim();
  return list.filter(o=>{
    const t=o.createdAt;
    if(from && t < new Date(from+'T00:00:00').getTime()) return false;
    if(to && t > new Date(to+'T23:59:59').getTime()) return false;
    if(q){ const c=o.customer||{}; const hay=((o.orderNo||o.no||'')+' '+(c.email||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
}
function clearFilters(){ $('fFrom').value=''; $('fTo').value=''; $('fSearch').value=''; load(); }
async function setStatus(no){ const s=$('st-'+no).value; await api('/orders/'+no+'/status',{method:'POST',body:JSON.stringify({status:s})}); load(); }
async function setTracking(no){ await api('/orders/'+no+'/tracking',{method:'POST',body:JSON.stringify({carrier:$('car-'+no).value,number:$('trk-'+no).value})}); load(); }
</script>
</body></html>
